services:
  invoice-tracker:
    build: ./invoice-tracker
    ports:
      - "8001:8001"
    env_file: ./invoice-tracker/.env
    restart: unless-stopped
    volumes:
      - ./invoice-tracker/data:/app/data

  appointment-reminder:
    build: ./appointment-reminder
    ports:
      - "8002:8002"
    env_file: ./appointment-reminder/.env
    restart: unless-stopped

  inventory-alert:
    build: ./inventory-alert
    ports:
      - "8003:8003"
    env_file: ./inventory-alert/.env
    restart: unless-stopped

  daily-digest:
    build: ./daily-digest
    ports:
      - "8004:8004"
    env_file: ./daily-digest/.env
    restart: unless-stopped

  lead-capture:
    build: ./lead-capture
    ports:
      - "8005:8005"
    env_file: ./lead-capture/.env
    restart: unless-stopped

  expense-logger:
    build: ./expense-logger
    ports:
      - "8006:8006"
    env_file: ./expense-logger/.env
    restart: unless-stopped

  review-monitor:
    build: ./review-monitor
    ports:
      - "8007:8007"
    env_file: ./review-monitor/.env
    restart: unless-stopped

  staff-scheduler:
    build: ./staff-scheduler
    ports:
      - "8008:8008"
    env_file: ./staff-scheduler/.env
    restart: unless-stopped

  order-confirmation:
    build: ./order-confirmation
    ports:
      - "8009:8009"
    env_file: ./order-confirmation/.env
    restart: unless-stopped

  backup-notifier:
    build: ./backup-notifier
    ports:
      - "8010:8010"
    env_file: ./backup-notifier/.env
    restart: unless-stopped
    volumes:
      - ./backup-notifier/watch:/data/watch
      - ./backup-notifier/backups:/data/backups
